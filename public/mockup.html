<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AdLauncher — Wireframe</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f1117;color:#fff;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:#161b27;border-bottom:1px solid #2a2f3e;padding:10px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0}
header h1{font-size:14px;font-weight:700}
header p{font-size:11px;color:#6b7280}
.tabs{display:flex;gap:4px;margin-left:auto}
.tab{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #2a2f3e;background:#1e2433;color:#9ca3af}
.tab.active{background:#2563eb;border-color:#2563eb;color:#fff}
canvas{display:block}
</style>
</head>
<body>
<header>
  <div><h1>🚀 AdLauncher — Wireframe</h1><p>Click tab để xem từng màn hình</p></div>
  <div class="tabs">
    <div class="tab active" data-s="onboard">1. Onboarding</div>
    <div class="tab" data-s="dashboard">2. Dashboard</div>
    <div class="tab" data-s="launch">3. Bulk Launch</div>
    <div class="tab" data-s="assets">4. Assets</div>
    <div class="tab" data-s="adsmanager">5. Ads Manager</div>
    <div class="tab" data-s="analytics">6. Analytics</div>
    <div class="tab" data-s="automation">7. Automation</div>
    <div class="tab" data-s="team">8. Team</div>
  </div>
</header>
<canvas id="c"></canvas>

<script>
const cv = document.getElementById('c')
const ctx = cv.getContext('2d')
let W, H, dpr, current = 'onboard'

const K = {
  bg:'#0f1117', sb:'#161b27', panel:'#1a1f2e', card:'#1e2433',
  bdr:'#2a2f3e', blue:'#2563eb', bll:'#3b82f6', grn:'#16a34a',
  org:'#d97706', red:'#dc2626', txt:'#f9fafb', mut:'#6b7280', dim:'#374151'
}

function resize(){
  dpr = window.devicePixelRatio || 1
  W = window.innerWidth
  H = window.innerHeight - document.querySelector('header').offsetHeight
  cv.width = W * dpr; cv.height = H * dpr
  cv.style.width = W + 'px'; cv.style.height = H + 'px'
  ctx.scale(dpr, dpr)
  draw()
}

// scale from 1280x720 base
function s(v){ return v * Math.min(W/1280, H/720) }

function rect(x,y,w,h,rad,fill,stroke){
  ctx.beginPath()
  if(rad > 0){
    ctx.roundRect(x,y,w,h,rad)
  } else {
    ctx.rect(x,y,w,h)
  }
  if(fill){ctx.fillStyle=fill;ctx.fill()}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=1;ctx.stroke()}
}

function txt(str,x,y,size,col,align,bold){
  ctx.font = (bold?'700 ':'400 ') + s(size) + 'px -apple-system,BlinkMacSystemFont,sans-serif'
  ctx.fillStyle = col
  ctx.textAlign = align||'left'
  ctx.fillText(str, x, y)
}

function pill(x,y,w,h,fill,label,lc,fs){
  rect(x,y,w,h,h/2,fill)
  txt(label,x+w/2,y+h*0.65,fs||10,lc||'#fff','center',true)
}

function badge(x,y,label,fill,lc){
  pill(x,y,s(60),s(18),fill,label,lc,9)
}

// ── SIDEBAR ──────────────────────────────────
function sidebar(active){
  const sw = s(60)
  rect(0,0,sw,H,0,K.sb)
  rect(sw-1,0,1,H,0,K.bdr)
  // logo
  rect(s(10),s(10),s(40),s(40),s(8),K.blue)
  txt('A',s(30),s(38),16,'#fff','center',true)
  const items=[
    {e:'🚀',l:'Launch',k:'launch',y:80},
    {e:'🖼️',l:'Assets',k:'assets',y:140},
    {e:'📊',l:'Insights',k:'insights',y:200},
    {e:'⚡',l:'Automate',k:'automate',y:260},
    {e:'🔗',l:'Connect',k:'connect',y:320},
    {e:'💡',l:'Inspo',k:'inspo',y:380},
  ]
  items.forEach(it=>{
    const on = it.k===active
    if(on) rect(0,s(it.y-4),sw,s(44),0,'rgba(37,99,235,.2)')
    ctx.font = s(18)+'px serif'; ctx.textAlign='center'
    ctx.fillText(it.e, s(30), s(it.y+14))
    txt(it.l,s(30),s(it.y+30),8,on?K.bll:K.mut,'center')
  })
  // avatar
  rect(s(12),H-s(46),s(36),s(36),s(18),K.blue)
  txt('T',s(30),H-s(22),13,'#fff','center',true)
}

// ── SUB SIDEBAR ───────────────────────────────
function subbar(items, active){
  const x=s(60), sw=s(148)
  rect(x,0,sw,H,0,K.panel)
  rect(x+sw-1,0,1,H,0,K.bdr)
  items.forEach((it,i)=>{
    const on=it===active, y=s(40+i*36)
    if(on) rect(x,y-s(4),sw,s(32),0,'rgba(37,99,235,.15)')
    txt((on?'▸ ':'')+it, x+s(on?20:14), y+s(16), 11, on?K.bll:K.txt)
  })
  rect(x+s(10),H-s(54),sw-s(20),s(34),s(8),'rgba(234,179,8,.1)')
  txt('⚡ Upgrade Plan',x+sw/2,H-s(30),10,'#eab308','center',true)
}

// ── TOPBAR ────────────────────────────────────
function topbar(cx, title){
  rect(cx,0,W-cx,s(48),0,K.sb)
  rect(cx,s(47),W-cx,1,0,K.bdr)
  txt(title,cx+s(18),s(30),13,K.txt,'left',true)
}

// ══════════════════════════════════════════════
//  SCREENS
// ══════════════════════════════════════════════

function screenOnboard(){
  rect(0,0,W,H,0,K.bg)
  sidebar('launch')
  subbar(['Ad Launcher','Ads Manager','Templates'],'Ad Launcher')

  const cx=s(208), cw=W-cx
  topbar(cx,'Get started')

  // progress steps
  const steps=['Connect','Billing','Launch'], sw2=s(120)
  const stx=cx+(cw-steps.length*sw2)/2
  steps.forEach((st,i)=>{
    const done=i<0, active=i===0
    const col=active?K.blue:K.dim
    const x=stx+i*sw2+sw2/2
    rect(x-s(10),s(14),s(20),s(20),s(10),col)
    txt(''+(i+1),x,s(28),9,'#fff','center',true)
    txt(st,x,s(44),9,active?K.txt:K.mut,'center')
    if(i<steps.length-1){rect(x+s(10),s(23),sw2-s(20),s(2),0,K.dim)}
  })
  // progress bar
  rect(cx,s(47),cw,s(3),0,K.dim)
  rect(cx,s(47),cw*0.34,s(3),0,K.blue)

  // Card
  const crdX=cx+s(60), crdW=cw-s(120), crdY=s(58), crdH=H-crdY-s(12)
  rect(crdX,crdY,crdW,crdH,s(12),K.card,K.bdr)

  ctx.font=s(28)+'px serif'; ctx.textAlign='center'
  ctx.fillText('🔗',crdX+crdW/2,crdY+s(54))
  txt('Connect your ad platform',crdX+crdW/2,crdY+s(80),16,K.txt,'center',true)
  txt('Connect at least one ad platform to get started.',crdX+crdW/2,crdY+s(100),11,K.mut,'center')

  // platform cards
  const plats=[
    {n:'Meta',e:'📘',c:'#1877f2'},
    {n:'TikTok',e:'🎵',c:'#ff0050'},
    {n:'Google Ads',e:'🔵',c:'#4285f4'},
    {n:'Snapchat',e:'👻',c:'#fffc00'},
    {n:'Pinterest',e:'📌',c:'#e60023'},
    {n:'Taboola',e:'📰',c:'#0066cc'},
  ]
  const cols=3, pw=(crdW-s(60))/cols, ph=s(110), pgx=crdX+s(20), pgy=crdY+s(118)
  plats.forEach((p,i)=>{
    const col=i%cols, row=Math.floor(i/cols)
    const px2=pgx+col*(pw+s(10)), py2=pgy+row*(ph+s(14))
    rect(px2,py2,pw,ph,s(10),K.panel,K.bdr)
    ctx.font=s(24)+'px serif'; ctx.textAlign='center'
    ctx.fillText(p.e, px2+pw/2, py2+s(40))
    txt(p.n,px2+pw/2,py2+s(62),11,K.txt,'center',true)
    pill(px2+(pw-s(80))/2,py2+ph-s(26),s(80),s(20),K.blue,'Connect','#fff',10)
  })
}

function screenDashboard(){
  rect(0,0,W,H,0,K.bg)
  sidebar('insights')
  subbar(['Overview','Performance','Batches'],'Overview')

  const cx=s(208), cw=W-cx
  topbar(cx,'Dashboard')

  // KPI cards
  const kpis=[
    {l:'Ads Launched Today',v:'124',e:'🚀',c:K.blue},
    {l:'Active Campaigns',v:'38',e:'📁',c:K.grn},
    {l:'Total Spend',v:'$12,450',e:'💸',c:K.org},
    {l:'Avg ROAS',v:'3.4×',e:'📈',c:'#8b5cf6'},
  ]
  const kw=(cw-s(20)-s(12)*3)/4
  kpis.forEach((k,i)=>{
    const kx=cx+s(16)+i*(kw+s(12)), ky=s(56)
    rect(kx,ky,kw,s(76),s(8),K.card,K.bdr)
    rect(kx+s(10),ky+s(10),s(34),s(34),s(6),k.c+'33')
    ctx.font=s(18)+'px serif'; ctx.textAlign='left'
    ctx.fillText(k.e, kx+s(17), ky+s(34))
    txt(k.v,kx+kw-s(12),ky+s(34),18,K.txt,'right',true)
    txt(k.l,kx+s(10),ky+s(62),9,K.mut)
  })

  // Chart
  const chY=s(148), chH=H-chY-s(100), chW=cw-s(260)
  rect(cx+s(16),chY,chW,chH,s(10),K.card,K.bdr)
  txt('📊 Spend & ROAS — Last 7 days',cx+s(32),chY+s(26),12,K.txt,'left',true)
  const bars2=7, bw2=s(26), bsp=s(14)
  const btx=cx+s(16)+(chW-(bars2*(bw2+bsp)))/2
  const lbs=['Mon','Tue','Wed','Thu','Fri','Sat','Sun']
  const vs=[55,70,45,90,80,60,85]
  vs.forEach((v,i)=>{
    const bh=v/100*(chH-s(60))
    const bx=btx+i*(bw2+bsp), by=chY+chH-s(36)-bh
    rect(bx,by,bw2,bh,s(4),K.blue+'99')
    txt(lbs[i],bx+bw2/2,chY+chH-s(18),8,K.mut,'center')
  })

  // Batch list
  const blX=cx+s(16)+chW+s(12), blW=W-blX-s(16)
  rect(blX,chY,blW,chH,s(10),K.card,K.bdr)
  txt('Recent Batches',blX+s(12),chY+s(26),12,K.txt,'left',true)
  const bts=['Batch #42 — 24 ads','Batch #41 — 18 ads','Batch #40 — 36 ads','Batch #39 — 12 ads']
  bts.forEach((b,i)=>{
    const by=chY+s(40)+i*s(44)
    rect(blX+s(8),by,blW-s(16),s(36),s(6),K.panel)
    txt(b,blX+s(18),by+s(22),10,K.txt)
    pill(blX+blW-s(58),by+s(9),s(48),s(18),K.grn+'33','Done','#4ade80',8)
  })

  // Team
  const tmY=H-s(84)
  rect(cx+s(16),tmY,cw-s(32),s(76),s(10),K.card,K.bdr)
  txt('👥 Team this week',cx+s(32),tmY+s(24),12,K.txt,'left',true)
  const mbs=[{n:'Thuan N.',v:42,c:K.blue},{n:'Kevin L.',v:38,c:'#7c3aed'},{n:'Anna P.',v:29,c:'#0891b2'},{n:'David K.',v:17,c:K.grn}]
  mbs.forEach((m,i)=>{
    const mx=cx+s(200)+i*s(180), my=tmY+s(10)
    rect(mx,my,s(36),s(36),s(18),m.c)
    txt(m.n[0],mx+s(18),my+s(22),13,'#fff','center',true)
    txt(m.n,mx+s(52),my+s(16),10,K.txt)
    txt(m.v+' ads',mx+s(52),my+s(30),9,K.mut)
  })
}

function screenLaunch(){
  rect(0,0,W,H,0,K.bg)
  sidebar('launch')
  subbar(['Ad Launcher','Ads Manager','Templates'],'Ad Launcher')

  const cx=s(208), cw=W-cx
  topbar(cx,'Bulk Ad Launcher')

  // Left: Upload panel
  const lx=cx+s(14), lw=s(320), ly=s(56), lh=H-ly-s(14)
  rect(lx,ly,lw,lh,s(10),K.card,K.bdr)
  txt('📁 Upload Creative',lx+s(14),ly+s(26),12,K.txt,'left',true)

  // dropzone
  const dzy=ly+s(38), dzh=s(110)
  rect(lx+s(10),dzy,lw-s(20),dzh,s(8),K.panel)
  ctx.setLineDash([5,4]); ctx.strokeStyle=K.bdr; ctx.lineWidth=1.5
  ctx.strokeRect(lx+s(10),dzy,lw-s(20),dzh)
  ctx.setLineDash([])
  ctx.font=s(26)+'px serif'; ctx.textAlign='center'
  ctx.fillText('☁️',lx+lw/2,dzy+s(48))
  txt('Drag & drop files here',lx+lw/2,dzy+s(72),10,K.mut,'center')
  pill(lx+lw/2-s(50),dzy+dzh-s(22),s(100),s(20),K.blue,'Browse Files','#fff',10)

  // cloud icons
  txt('Connect:',lx+s(14),dzy+dzh+s(16),9,K.mut)
  const cls=['Drive','Dropbox','Frame.io','Box']
  cls.forEach((c,i)=>pill(lx+s(70)+i*s(62),dzy+dzh+s(4),s(56),s(18),K.dim,c,K.txt,8))

  // file list
  const fls=[
    {n:'video_hero.mp4',t:'video',st:'Ready',sc:K.grn},
    {n:'banner_sale.jpg',t:'image',st:'Ready',sc:K.grn},
    {n:'story_01.mp4',t:'video',st:'Uploading',sc:K.blue},
    {n:'carousel_1.jpg',t:'image',st:'Processing',sc:K.org},
    {n:'ugc_test.mp4',t:'video',st:'Queued',sc:K.dim},
  ]
  fls.forEach((f,i)=>{
    const fy=dzy+dzh+s(30)+i*s(36)
    rect(lx+s(8),fy,lw-s(16),s(28),s(6),K.panel)
    ctx.font=s(12)+'px serif'; ctx.textAlign='left'
    ctx.fillText(f.t==='video'?'🎬':'🖼️', lx+s(18), fy+s(18))
    txt(f.n,lx+s(36),fy+s(18),9,K.txt)
    pill(lx+lw-s(78),fy+s(5),s(66),s(18),f.sc+'22',f.st,f.sc===K.dim?K.mut:f.sc,8)
  })

  // Right: Config panel
  const rx=lx+lw+s(14), rw=W-rx-s(14)
  rect(rx,ly,rw,lh,s(10),K.card,K.bdr)
  txt('⚙️ Launch Configuration',rx+s(14),ly+s(26),12,K.txt,'left',true)

  let ry=ly+s(46)

  // Platform
  txt('Platform',rx+s(14),ry,9,K.mut)
  const plats=['Meta','TikTok','Google','Snapchat']
  const pw2=(rw-s(28)-s(8)*3)/4
  plats.forEach((p,i)=>{
    const px2=rx+s(14)+i*(pw2+s(8))
    rect(px2,ry+s(6),pw2,s(30),s(6),i===0?'rgba(37,99,235,.25)':K.panel,i===0?K.blue:K.bdr)
    txt(p,px2+pw2/2,ry+s(26),10,i===0?K.bll:K.txt,'center',i===0)
  })
  ry+=s(48)

  // Campaign
  txt('Campaign',rx+s(14),ry,9,K.mut)
  rect(rx+s(14),ry+s(6),rw-s(28),s(30),s(6),K.panel,K.bdr)
  txt('● Create new campaign',rx+s(24),ry+s(26),10,K.txt)
  ry+=s(48)

  // Ad Set Mode
  txt('Ad Set Mode',rx+s(14),ry,9,K.mut)
  const modes=['1 Ad Set','Per Creative','Auto-divide','Custom']
  const mw=(rw-s(28)-s(8)*3)/4
  modes.forEach((m,i)=>{
    const mx=rx+s(14)+i*(mw+s(8))
    rect(mx,ry+s(6),mw,s(28),s(6),i===2?'rgba(37,99,235,.25)':K.panel,i===2?K.blue:K.bdr)
    txt(m,mx+mw/2,ry+s(24),9,i===2?K.bll:K.txt,'center',i===2)
  })
  ry+=s(48)

  // Content
  txt('Ad Content',rx+s(14),ry,9,K.mut)
  const flds=[{l:'Headline',v:'Get 50% Off Today Only!'},{l:'Primary Text',v:'Don\'t miss our biggest sale of...'},{l:'CTA',v:'SHOP_NOW'},{l:'Website URL',v:'https://example.com/sale'}]
  flds.forEach((f,i)=>{
    const fh=i===1?s(44):s(28), fy=ry+s(8)+i*(fh+s(10))
    txt(f.l,rx+s(14),fy-s(1),8,K.mut)
    rect(rx+s(14),fy+s(3),rw-s(28),fh,s(6),K.panel,K.bdr)
    txt(f.v,rx+s(24),fy+s(18),9,K.txt)
  })

  // Launch button
  const btnY=H-s(66)
  rect(rx+s(14),btnY,rw-s(28),s(42),s(10),K.blue)
  txt('🚀  Launch 5 Ads',rx+s(14)+(rw-s(28))/2,btnY+s(26),13,'#fff','center',true)
}

function screenAssets(){
  rect(0,0,W,H,0,K.bg)
  sidebar('assets')
  subbar(['All Assets','Images','Videos','Top Performers'],'All Assets')

  const cx=s(208), cw=W-cx
  topbar(cx,'Creative Library')

  // toolbar
  rect(cx+s(14),s(56),cw-s(28),s(38),s(8),K.panel,K.bdr)
  rect(cx+s(22),s(63),s(180),s(22),s(6),K.card,K.bdr)
  txt('🔍  Search assets...',cx+s(30),s(78),9,K.mut)
  const fbtns=['All','Images','Videos']
  fbtns.forEach((b,i)=>pill(cx+s(214)+i*s(76),s(62),s(68),s(24),K.dim,b,K.txt,9))
  pill(W-s(110),s(62),s(90),s(24),K.blue,'+ Upload','#fff',10)

  // grid
  const cols=5, gx=cx+s(14), gy=s(102), gw=(cw-s(28)-s(12)*(cols-1))/cols, gh=s(150)
  const items=[
    {n:'video_hero',t:'video'},{n:'banner_sale',t:'image'},{n:'story_01',t:'video'},
    {n:'carousel_1',t:'image'},{n:'ugc_test',t:'video'},{n:'promo_banner',t:'image'},
    {n:'reel_format',t:'video'},{n:'product_shot',t:'image'},{n:'animation',t:'video'},
    {n:'lifestyle',t:'image'},
  ]
  items.forEach((it,i)=>{
    const col=i%cols, row=Math.floor(i/cols)
    const ix=gx+col*(gw+s(12)), iy=gy+row*(gh+s(12))
    rect(ix,iy,gw,gh,s(8),K.card,K.bdr)
    rect(ix,iy,gw,gh-s(38),s(8),it.t==='video'?'#0d1b2e':'#0d2b1b')
    ctx.font=s(26)+'px serif'; ctx.textAlign='center'
    ctx.fillText(it.t==='video'?'🎬':'🖼️', ix+gw/2, iy+(gh-s(38))/2+s(10))
    txt(it.n,ix+s(6),iy+gh-s(22),8,K.txt)
    pill(ix+gw-s(50),iy+gh-s(32),s(44),s(16),it.t==='video'?K.blue+'33':K.grn+'33',it.t==='video'?'Video':'Image',it.t==='video'?'#93c5fd':'#4ade80',7)
  })
}

function screenAdsmanager(){
  rect(0,0,W,H,0,K.bg)
  sidebar('launch')
  subbar(['Ad Launcher','Ads Manager','Templates'],'Ads Manager')

  const cx=s(208), cw=W-cx
  topbar(cx,'Ads Manager')

  // columns
  const cols=[
    {l:'#',w:s(28)},{l:'Preview',w:s(60)},{l:'Name',w:s(160)},
    {l:'Campaign',w:s(140)},{l:'Ad Set',w:s(130)},
    {l:'Headline',w:s(150)},{l:'Primary Text',w:s(170)},
    {l:'CTA',w:s(80)},{l:'Status',w:s(84)},
  ]
  const thY=s(56), thH=s(32)
  rect(cx,thY,cw,thH,0,K.panel)
  rect(cx,thY+thH-1,cw,1,0,K.bdr)
  let cx2=cx
  cols.forEach(c=>{
    txt(c.l,cx2+s(6),thY+s(20),9,K.mut,'left',true)
    rect(cx2+c.w-1,thY,1,thH,0,K.bdr)
    cx2+=c.w
  })

  // rows
  const rows=[
    {n:'video_hero.mp4',t:'video',camp:'TEST CBO Q1',adset:'All-AutoBid',hl:'50% Off Today!',pt:'Shop the biggest sale...',cta:'SHOP_NOW',st:'Ready',sc:K.grn},
    {n:'banner_sale.jpg',t:'image',camp:'TEST CBO Q1',adset:'All-AutoBid',hl:'Limited Time Offer',pt:'Get yours before it\'s gone...',cta:'LEARN_MORE',st:'Launched',sc:K.blue},
    {n:'story_01.mp4',t:'video',camp:'SCALE CBO',adset:'US-Broad',hl:'',pt:'',cta:'SIGN_UP',st:'Draft',sc:K.mut},
    {n:'carousel_1.jpg',t:'image',camp:'SCALE CBO',adset:'US-Broad',hl:'New Collection Drop',pt:'Discover our latest...',cta:'SHOP_NOW',st:'Ready',sc:K.grn},
    {n:'ugc_test.mp4',t:'video',camp:'LAB ABO',adset:'UK-Interest',hl:'Real Results',pt:'See what customers say...',cta:'LEARN_MORE',st:'Ready',sc:K.grn},
    {n:'promo_banner.jpg',t:'image',camp:'LAB ABO',adset:'UK-Interest',hl:'',pt:'',cta:'',st:'Draft',sc:K.mut},
  ]
  rows.forEach((row,i)=>{
    const ry=thY+thH+i*s(38)
    rect(cx,ry,cw,s(38),0,i%2===0?K.card:K.panel)
    rect(cx,ry+s(37),cw,1,0,K.bdr)
    let rx=cx
    // #
    txt(''+(i+1),rx+rx/2+s(14),ry+s(24),9,K.mut,'center')
    rx+=s(28)
    // preview
    rect(rx+s(5),ry+s(4),s(28),s(28),s(4),K.dim)
    ctx.font=s(14)+'px serif'; ctx.textAlign='center'
    ctx.fillText(row.t==='video'?'🎬':'🖼️', rx+s(19), ry+s(21))
    rx+=s(60)
    // data cells
    const cells=[row.n,row.camp,row.adset,row.hl,row.pt,row.cta]
    const cws=[s(160),s(140),s(130),s(150),s(170),s(80)]
    cells.forEach((cell,j)=>{
      ctx.save()
      ctx.beginPath(); ctx.rect(rx,ry,cws[j],s(38)); ctx.clip()
      txt(cell||'—',rx+s(6),ry+s(24),9,cell?K.txt:K.dim)
      ctx.restore()
      rect(rx+cws[j]-1,ry,1,s(38),0,K.bdr)
      rx+=cws[j]
    })
    // status
    pill(rx+s(6),ry+s(10),s(66),s(18),row.sc+'22',row.st,row.sc===K.mut?K.mut:row.sc,8)
  })

  // bottom bar
  rect(cx,H-s(36),cw,s(36),0,K.panel)
  rect(cx,H-s(37),cw,1,0,K.bdr)
  txt('6 creatives  ·  4 Ready  ·  2 Draft',cx+s(18),H-s(14),10,K.mut)
  pill(W-s(150),H-s(28),s(132),s(22),K.blue,'Launch Selected (4)','#fff',10)
}

function screenAnalytics(){

  const cx=s(208), cw=W-cx
  topbar(cx,'Analytics — Creative Performance')

  // KPIs
  const kpis=[
    {l:'Impressions',v:'2.4M',d:'+12%',up:true},
    {l:'Clicks',v:'48.2K',d:'+8%',up:true},
    {l:'Spend',v:'$12,450',d:'-3%',up:false},
    {l:'ROAS',v:'3.4×',d:'+22%',up:true},
    {l:'CPM',v:'$5.18',d:'-6%',up:true},
  ]
  const kw=(cw-s(28)-s(12)*4)/5
  kpis.forEach((k,i)=>{
    const kx=cx+s(14)+i*(kw+s(12)), ky=s(56)
    rect(kx,ky,kw,s(68),s(8),K.card,K.bdr)
    txt(k.v,kx+s(10),ky+s(30),17,K.txt,'left',true)
    txt(k.l,kx+s(10),ky+s(50),8,K.mut)
    const dc=k.up?K.grn:K.red
    pill(kx+kw-s(44),ky+s(8),s(38),s(16),dc+'22',k.d,dc,8)
  })

  // Table
  const tY=s(140), tW=cw-s(220)
  rect(cx+s(14),tY,tW,H-tY-s(14),s(10),K.card,K.bdr)
  txt('🏆 Top Performing Creatives',cx+s(28),tY+s(24),12,K.txt,'left',true)
  const tcols=[{l:'Creative',w:s(140)},{l:'Impressions',w:s(90)},{l:'CTR',w:s(70)},{l:'ROAS',w:s(70)},{l:'Spend',w:s(80)},{l:'',w:s(40)}]
  let tcx=cx+s(14)
  tcols.forEach(c=>{txt(c.l,tcx+s(8),tY+s(46),8,K.mut,'left',true);tcx+=c.w})
  rect(cx+s(14),tY+s(50),tW,1,0,K.bdr)

  const trows=[
    {n:'video_hero',imp:'480K',ctr:'4.2%',roas:'5.1×',sp:'$2,100',s:'🟢'},
    {n:'ugc_test',imp:'320K',ctr:'3.8%',roas:'4.7×',sp:'$1,800',s:'🟢'},
    {n:'banner_sale',imp:'280K',ctr:'2.9%',roas:'3.2×',sp:'$1,400',s:'🟢'},
    {n:'story_01',imp:'190K',ctr:'2.1%',roas:'2.8×',sp:'$900',s:'🟡'},
    {n:'carousel_1',imp:'150K',ctr:'1.8%',roas:'1.9×',sp:'$700',s:'🔴'},
  ]
  trows.forEach((row,i)=>{
    const ry=tY+s(54)+i*s(40)
    rect(cx+s(14),ry,tW,s(40),0,i%2===0?'transparent':K.panel+'55')
    let trx=cx+s(14)
    ctx.font=s(12)+'px serif'; ctx.textAlign='left'
    ctx.fillText(row.n.includes('video')||row.n.includes('story')?'🎬':'🖼️', trx+s(8), ry+s(24))
    txt(row.n,trx+s(26),ry+s(24),9,K.txt)
    trx+=s(140)
    ;[row.imp,row.ctr,row.roas,row.sp].forEach((v,j)=>{
      const w=[s(90),s(70),s(70),s(80)][j]
      txt(v,trx+s(8),ry+s(24),10,j===2?'#4ade80':j===1?K.bll:K.txt)
      trx+=w
    })
    ctx.font=s(14)+'px serif'; ctx.textAlign='center'
    ctx.fillText(row.s, trx+s(12), ry+s(24))
  })

  // Pie chart
  const px=cx+s(14)+tW+s(12), pw=W-px-s(14)
  rect(px,tY,pw,H-tY-s(14),s(10),K.card,K.bdr)
  txt('Spend by Platform',px+s(12),tY+s(24),11,K.txt,'left',true)
  const pr=s(48), pcx=px+pw/2, pcy=tY+s(120)
  const pd=[{n:'Meta',v:60,c:K.blue},{n:'TikTok',v:25,c:'#ff0050'},{n:'Google',v:10,c:'#4285f4'},{n:'Snap',v:5,c:'#fffc00'}]
  let ang=-Math.PI/2
  pd.forEach(p=>{
    const a=p.v/100*Math.PI*2
    ctx.beginPath(); ctx.moveTo(pcx,pcy)
    ctx.arc(pcx,pcy,pr,ang,ang+a)
    ctx.closePath(); ctx.fillStyle=p.c; ctx.fill()
    ang+=a
  })
  rect(pcx-s(20),pcy-s(20),s(40),s(40),s(20),K.card)
  pd.forEach((p,i)=>{
    const ly=tY+s(186)+i*s(26)
    rect(px+s(12),ly,s(12),s(12),s(2),p.c)
    txt(p.n+'  '+p.v+'%',px+s(28),ly+s(10),10,K.txt)
  })
}

function screenAutomation(){
  rect(0,0,W,H,0,K.bg)
  sidebar('automate')
  subbar(['Rules','Schedules','Logs'],'Rules')

  const cx=s(208), cw=W-cx
  topbar(cx,'Automation Rules')

  rect(cx+s(14),s(56),cw-s(28),s(36),s(8),K.panel,K.bdr)
  txt('⚡ Active Rules (5)',cx+s(28),s(80),12,K.txt,'left',true)
  pill(W-s(120),s(64),s(104),s(22),K.blue,'+ New Rule','#fff',10)

  const rules=[
    {n:'Pause Low ROAS',c:'ROAS < 1.5 for 3 days',a:'Pause Ad Set',on:true,r:24},
    {n:'Scale Winners',c:'ROAS > 4.0 for 2 days',a:'Increase budget 20%',on:true,r:8},
    {n:'Daily Budget Cap',c:'Spend > $500/day',a:'Pause Campaign',on:false,r:0},
    {n:'CPA Alert',c:'CPA > $30',a:'Send Slack notification',on:true,r:12},
    {n:'Auto-Activate',c:'ROAS > 2.5 after pause',a:'Resume Ad Set',on:true,r:5},
  ]
  rules.forEach((rule,i)=>{
    const ry=s(102)+i*s(62)
    rect(cx+s(14),ry,cw-s(28),s(54),s(10),K.card,K.bdr)
    txt(rule.n,cx+s(28),ry+s(20),12,K.txt,'left',true)
    txt('IF  '+rule.c,cx+s(28),ry+s(38),9,K.mut)
    txt('→ '+rule.a,cx+s(180),ry+s(38),9,K.bll)
    txt('Triggered '+rule.r+'×',W-s(140),ry+s(38),8,K.mut)
    // toggle
    const ton=rule.on
    rect(W-s(66),ry+s(14),s(36),s(20),s(10),ton?K.grn+'44':K.dim)
    rect(ton?W-s(36):W-s(62),ry+s(16),s(16),s(16),s(8),ton?K.grn:K.mut)
    pill(cx+s(28),ry+s(6),s(44),s(16),rule.on?K.grn+'22':K.dim,rule.on?'Active':'Off',rule.on?'#4ade80':K.mut,8)
  })

  // Builder
  const bY=s(102)+rules.length*s(62)+s(12)
  rect(cx+s(14),bY,cw-s(28),H-bY-s(14),s(10),K.panel,K.bdr)
  txt('🔧 Rule Builder',cx+s(28),bY+s(24),12,K.txt,'left',true)
  const blks=[{l:'IF',v:'ROAS < value'},{l:'THEN',v:'Pause Ad Set'},{l:'FOR',v:'3 consecutive days'}]
  blks.forEach((b,i)=>{
    const bx=cx+s(28)+i*s(196), by=bY+s(38)
    rect(bx,by,s(176),s(34),s(6),K.card,K.bdr)
    txt(b.l,bx+s(10),by+s(22),8,K.mut)
    txt(b.v,bx+s(40),by+s(22),10,K.txt)
    if(i<blks.length-1) txt('→',bx+s(180),by+s(22),12,K.mut,'center')
  })
}

// ── DRAW ─────────────────────────────────────
const screens={
  onboard:screenOnboard,
  dashboard:screenDashboard,
  launch:screenLaunch,
  assets:screenAssets,
  adsmanager:screenAdsmanager,
  analytics:screenAnalytics,
  automation:screenAutomation,
  team:screenTeam,
}

function draw(){
  ctx.clearRect(0,0,W,H)
  try{ screens[current]() }
  catch(e){
    rect(0,0,W,H,0,'#111')
    txt('Error: '+e.message,W/2,H/2,12,'#f87171','center')
    console.error(e)
  }
}

document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
    tab.classList.add('active')
    current=tab.dataset.s
    draw()
  })
})

window.addEventListener('resize',resize)
resize()
