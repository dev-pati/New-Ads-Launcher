// ── Layout ────────────────────────────────────
// Radial tree: root center, children fan out

const NODE_W = 148, NODE_H = 32, NODE_R = 6
const LEVEL_GAP = [0, 200, 170, 140] // gap between levels
const DEFAULT_COLOR = '#1e2433'
const DEFAULT_BORDER = '#2a2f3e'
const DEFAULT_TEXT = '#e5e7eb'

let nodes = [] // flat list with computed x,y

function buildTree(node, x, y, level, angleStart, angleEnd) {
  // compute node size
  const w = level === 0 ? 180 : level === 1 ? 160 : level === 2 ? 148 : 138
  const h = level === 0 ? 42 : 34

  node._x = x - w/2
  node._y = y - h/2
  node._w = w
  node._h = h
  node._cx = x
  node._cy = y
  node._level = level
  nodes.push(node)

  if (!node.children || !node.children.length) return

  const n = node.children.length
  const gap = LEVEL_GAP[Math.min(level, LEVEL_GAP.length-1)] || 150
  const r = gap

  // spread angle
  const spreadAngle = angleEnd - angleStart
  const step = spreadAngle / (n > 1 ? n-1 : 1)

  node.children.forEach((child, i) => {
    const angle = n === 1
      ? (angleStart + angleEnd) / 2
      : angleStart + i * step
    const cx2 = x + Math.cos(angle) * r
    const cy2 = y + Math.sin(angle) * r
    child._parentX = x
    child._parentY = y
    buildTree(child, cx2, cy2, level+1, angle - 0.4, angle + 0.4)
  })
}

function initTree() {
  nodes = []
  const cx = W/2, cy = H/2
  const n = ROOT.children.length
  const step = (Math.PI * 2) / n

  // place root
  buildTree(ROOT, cx, cy, 0, 0, Math.PI*2)

  // re-layout children of root in circle
  ROOT.children.forEach((child, i) => {
    const angle = -Math.PI/2 + i * step
    const r = 240
    const cx2 = cx + Math.cos(angle) * r
    const cy2 = cy + Math.sin(angle) * r
    const spreadA = angle - 0.7, spreadB = angle + 0.7
    // rebuild subtree
    child._parentX = cx
    child._parentY = cy
    buildTree(child, cx2, cy2, 1, spreadA, spreadB)
  })
}

// ── Draw helpers ──────────────────────────────
function drawRoundRect(x, y, w, h, r2, fill, stroke, sw2) {
  ctx.beginPath()
  ctx.roundRect(x, y, w, h, r2)
  if (fill) { ctx.fillStyle = fill; ctx.fill() }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = sw2||1; ctx.stroke() }
}

function drawNode(node) {
  const { _x:x, _y:y, _w:w, _h:h, _level:lv } = node
  const fill = node.color || DEFAULT_COLOR
  const border = node.color ? node.color : DEFAULT_BORDER
  const tcolor = node.textColor || DEFAULT_TEXT
  const shadow = node.color ? node.color + '44' : '#00000066'

  // glow / shadow
  ctx.shadowColor = shadow
  ctx.shadowBlur = lv === 0 ? 24 : lv === 1 ? 16 : 8

  drawRoundRect(x, y, w, h, NODE_R, fill, border, lv < 2 ? 1.5 : 1)

  ctx.shadowBlur = 0

  // text
  const fs = lv === 0 ? 14 : lv === 1 ? 11.5 : lv === 2 ? 10.5 : 9.5
  ctx.font = `${lv<2?'700':'500'} ${fs}px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif`
  ctx.fillStyle = tcolor
  ctx.textAlign = 'center'
  ctx.textBaseline = 'middle'

  // truncate
  let label = node.label
  const maxW = w - 16
  while (ctx.measureText(label).width > maxW && label.length > 4) {
    label = label.slice(0, -2) + '…'
  }
  ctx.fillText(label, x + w/2, y + h/2)
}

function drawEdge(child) {
  if (child._parentX === undefined) return
  const px2 = child._parentX, py2 = child._parentY
  const cx2 = child._cx, cy2 = child._cy

  // curved line
  const dx = cx2 - px2, dy = cy2 - py2
  const mx = px2 + dx * 0.5, my = py2 + dy * 0.5

  const lv = child._level
  const col = lv === 1
    ? (child.color || '#374151') + 'cc'
    : lv === 2
    ? (child.color || '#374151') + '88'
    : '#374151'

  ctx.beginPath()
  ctx.moveTo(px2, py2)
  ctx.quadraticCurveTo(mx, py2, cx2, cy2)
  ctx.strokeStyle = col
  ctx.lineWidth = lv === 1 ? 1.5 : 1
  ctx.stroke()
}

// ── Main draw ─────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H)

  // background grid
  ctx.save()
  ctx.translate(ox, oy)
  ctx.scale(zoom, zoom)

  // subtle dot grid
  const gs = 40, gox = (-ox/zoom) % gs, goy = (-oy/zoom) % gs
  ctx.fillStyle = '#ffffff08'
  for (let gx = -gs + gox; gx < W/zoom + gs; gx += gs) {
    for (let gy = -gs + goy; gy < H/zoom + gs; gy += gs) {
      ctx.beginPath()
      ctx.arc(gx, gy, 1, 0, Math.PI*2)
      ctx.fill()
    }
  }

  // draw edges first (behind nodes)
  ctx.setLineDash([3, 3])
  nodes.forEach(n => { if (n._level > 0) drawEdge(n) })
  ctx.setLineDash([])

  // draw nodes
  nodes.forEach(n => drawNode(n))

  ctx.restore()

  // title
  ctx.font = '700 13px -apple-system,sans-serif'
  ctx.fillStyle = '#374151'
  ctx.textAlign = 'left'
  ctx.textBaseline = 'top'
  ctx.fillText('AdLauncher — Sơ đồ tư duy', 16, 16)
}

// ── Pan / Zoom ────────────────────────────────
cv.addEventListener('mousedown', e => {
  dragging = true; lastX = e.clientX; lastY = e.clientY
  cv.style.cursor = 'grabbing'
})
cv.addEventListener('mousemove', e => {
  if (!dragging) return
  ox += e.clientX - lastX; oy += e.clientY - lastY
  lastX = e.clientX; lastY = e.clientY
  draw()
})
cv.addEventListener('mouseup', () => { dragging = false; cv.style.cursor = 'grab' })
cv.addEventListener('mouseleave', () => { dragging = false; cv.style.cursor = 'grab' })

cv.addEventListener('wheel', e => {
  e.preventDefault()
  const delta = e.deltaY > 0 ? 0.9 : 1.1
  const mx = e.clientX, my = e.clientY
  ox = mx - (mx - ox) * delta
  oy = my - (my - oy) * delta
  zoom = Math.max(0.2, Math.min(3, zoom * delta))
  draw()
}, {passive: false})

cv.addEventListener('dblclick', () => {
  ox = 0; oy = 0; zoom = 1; draw()
})

// touch
let lastDist = 0
cv.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { lastX = e.touches[0].clientX; lastY = e.touches[0].clientY }
  if (e.touches.length === 2) {
    lastDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY)
  }
})
cv.addEventListener('touchmove', e => {
  e.preventDefault()
  if (e.touches.length === 1) {
    ox += e.touches[0].clientX - lastX; oy += e.touches[0].clientY - lastY
    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY
    draw()
  }
  if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY)
    const scale2 = d / lastDist; lastDist = d
    zoom = Math.max(0.2, Math.min(3, zoom * scale2))
    draw()
  }
}, {passive: false})

document.getElementById('zIn').onclick = () => { zoom = Math.min(3, zoom*1.2); draw() }
document.getElementById('zOut').onclick = () => { zoom = Math.max(0.2, zoom*0.8); draw() }
document.getElementById('rst').onclick = () => { ox=0; oy=0; zoom=1; draw() }

cv.style.cursor = 'grab'

window.addEventListener('resize', () => { resize() })

function init() {
  W = window.innerWidth; H = window.innerHeight
  cv.width = W * devicePixelRatio; cv.height = H * devicePixelRatio
  cv.style.width = W+'px'; cv.style.height = H+'px'
  ctx.scale(devicePixelRatio, devicePixelRatio)
  initTree()
  draw()
}

init()
</script>
