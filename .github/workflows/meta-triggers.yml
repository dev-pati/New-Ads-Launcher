name: Check All Triggers

on:
  # schedule:
  #   # Runs daily at 9:00 AM UTC — DISABLED until System User token is configured
  #   - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (check triggers only, do NOT execute actions on Meta)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  check-meta-triggers:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call check-meta-triggers endpoint
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          echo "Dry run: $DRY_RUN"
          response=$(curl -s -L -o /tmp/response.json -w "%{http_code}" -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/check-meta-triggers?dry_run=${DRY_RUN}")
          echo "HTTP Status: $response"
          cat /tmp/response.json | python3 -m json.tool 2>/dev/null || cat /tmp/response.json
          if [ "$response" != "200" ]; then echo "❌ Failed with status $response"; exit 1; fi
          fired=$(cat /tmp/response.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('fired',0))" 2>/dev/null || echo "?")
          echo "✅ Meta triggers — fired: $fired"

  check-sheets-triggers:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call check-sheets-triggers endpoint
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          response=$(curl -s -L -o /tmp/response.json -w "%{http_code}" -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/check-sheets-triggers?dry_run=${DRY_RUN}")
          echo "HTTP Status: $response"
          cat /tmp/response.json | python3 -m json.tool 2>/dev/null || cat /tmp/response.json
          if [ "$response" != "200" ]; then echo "❌ Failed with status $response"; exit 1; fi
          fired=$(cat /tmp/response.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('fired',0))" 2>/dev/null || echo "?")
          echo "✅ Sheets triggers — fired: $fired"

  check-drive-triggers:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call check-drive-triggers endpoint
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          response=$(curl -s -L -o /tmp/response.json -w "%{http_code}" -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/check-drive-triggers?dry_run=${DRY_RUN}")
          echo "HTTP Status: $response"
          cat /tmp/response.json | python3 -m json.tool 2>/dev/null || cat /tmp/response.json
          if [ "$response" != "200" ]; then echo "❌ Failed with status $response"; exit 1; fi
          fired=$(cat /tmp/response.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('fired',0))" 2>/dev/null || echo "?")
          echo "✅ Drive triggers — fired: $fired"
